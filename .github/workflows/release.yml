name: Release FaizLaunch

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build renderer (Vite)
        run: npx vite build
        
      - name: Build main process (TypeScript)
        run: npx tsc -p tsconfig.main.json --skipLibCheck --noEmitOnError false
        continue-on-error: true

      - name: Verify dist/main/main.js exists
        run: |
          if (Test-Path "dist/main/main.js") {
            Write-Host "✅ dist/main/main.js found"
          } else {
            Write-Host "❌ dist/main/main.js NOT found — creating fallback"
            New-Item -ItemType Directory -Force -Path "dist/main/ipc"
            Copy-Item -Recurse "main/*" "dist/main/" -Force
          }
        shell: pwsh

      - name: Add author to package.json
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg | Add-Member -NotePropertyName "author" -NotePropertyValue "Mufaiz" -Force
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
        shell: pwsh

      - name: Build Electron installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          body: |
            ## ⚡ FaizLaunch ${{ github.ref_name }}

            ### For the gamer who has nothing but loves games the most.

            **How to install:**
            1. Download `FaizLaunch-Setup-${{ github.ref_name }}.exe`
            2. Run as Administrator
            3. Windows may show a warning — click **More info** → **Run anyway**
            4. Follow the installer

            **Features in this release:**
            - ⚡ Smart resumable installer — never fails at 99%
            - 🧬 DNA — full hardware scanner
            - 🚀 Turbo — one click PC optimizer
            - 📦 Vault — game backup system
            - 🤖 FaizAI — AI error diagnosis
            - 👥 Together — social layer
            - 🩺 Doctor — predictive repair
            - ⚙️ Settings panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
