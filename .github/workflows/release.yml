name: Release FaizLaunch

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.main.json --noEmitOnError false
        continue-on-error: true

      - name: Show full dist structure
        run: Get-ChildItem -Recurse dist/ | Select-Object FullName
        shell: pwsh

      - name: Build Windows installer
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          body: |
            ## ⚡ FaizLaunch ${{ github.ref_name }}
            ### For the gamer who has nothing but loves games the most.
            **How to install:**
            1. Download the .exe below
            2. Run as Administrator
            3. Click More info → Run anyway if Windows warns you
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
