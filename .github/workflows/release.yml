name: Release FaizLaunch

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.main.json --noEmitOnError false
        continue-on-error: true

      - name: Verify main.js
        run: |
          if (Test-Path "dist/main/main/main.js") {
            Write-Host "✅ main.js found at dist/main/main/main.js"
          } else {
            Get-ChildItem -Recurse dist/ | Select-Object FullName
            exit 1
          }
        shell: pwsh

      - name: Build Windows installer
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release files
        run: Get-ChildItem release/
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          body: |
            ## ⚡ FaizLaunch ${{ github.ref_name }}

            ### For the gamer who has nothing but loves games the most.

            **How to install:**
            1. Download `FaizLaunch-Setup-${{ github.ref_name }}.exe`
            2. Run as Administrator
            3. Windows may show a warning — click **More info** → **Run anyway**
            4. Follow the installer

            **Features:**
            - ⚡ Smart resumable installer — never fails at 99%
            - 🧬 DNA — full hardware scanner
            - 🚀 Turbo — one click PC optimizer
            - 📦 Vault — game backup system
            - 🤖 FaizAI — AI error diagnosis
            - 👥 Together — social layer
            - 🩺 Doctor — predictive repair
            - ⚙️ Settings panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
