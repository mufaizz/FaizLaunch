appId: com.faizlaunch.app
productName: FaizLaunch
copyright: FaizLaunch — For the gamer who has nothing but loves games the most

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.png
  installerHeaderIcon: assets/icon.png
  createDesktopShortcut: true
  createStartMenuShortcut: true

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - package.json