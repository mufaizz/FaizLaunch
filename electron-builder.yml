appId: com.faizlaunch.app
productName: FaizLaunch
copyright: FaizLaunch — For the gamer who has nothing but loves games the most

publish:
  provider: github
  owner: mufaizz
  repo: FaizLaunch

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  requestedExecutionLevel: requireAdministrator

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FaizLaunch
  license: LICENSE.txt

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - package.json

asar: true
